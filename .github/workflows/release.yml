name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  pack-and-publish:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/CrudDatastore.Package.csproj

      - name: Build
        run: dotnet build src/CrudDatastore.Package.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/CrudDatastore.Package.csproj --configuration Release --no-build --output artifacts/packages

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Get-ChildItem artifacts/packages/*.nupkg |
            Where-Object { $_.Name -notlike '*.snupkg' } |
            ForEach-Object {
              dotnet nuget push $_.FullName --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
            }