name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore CrudDatastore.sln

      - name: Build
        run: dotnet build CrudDatastore.sln --configuration Release --no-restore

      - name: Pack
        run: dotnet pack CrudDatastore.sln --configuration Release --no-build --output artifacts/packages

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate